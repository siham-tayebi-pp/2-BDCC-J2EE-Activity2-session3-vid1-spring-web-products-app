<!DOCTYPE html>
<html lang="en" xmlns:th="www.org.thymleaf">
<head>
    <meta charset="UTF-8">
    <title>Products Test</title>
    <link type="text/css" rel="stylesheet" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
</head>
<body>
<h1>Products Test</h1>
<table class="table p-3">
    <thead>
    <th>ID</th>
    <th>Nom</th>
    <th>Prix</th>
    <th>Quantite</th>
    </thead>
    <tbody>
      <tr th:each="p:${products}">
          <td th:text="${p.id}"></td>
          <td th:text="${p.name}"></td>
          <td th:text="${p.price}"></td>
          <td th:text="${p.quantity}"></td>
          <td ><a class="btn btn-danger" th:href="@{/deleteProduct(id=${p.id})}"   onclick="return confirm('Etes vous sure de suppr')">Delete</a></td>
      </tr>
    </tbody>
</table>
</body>
</html>
